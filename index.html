<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Confessions 💌</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffe6f0,#e6f7ff);
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
  text-align:center;
}

h2{ margin-top:20px; }

textarea{
  width:100%;
  height:120px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#ff6f91;
  color:white;
  font-size:16px;
}

.ad{
  background:#f3f3f3;
  padding:14px;
  margin:15px 0;
  border-radius:12px;
  font-size:12px;
  color:#666;
}

.small{
  font-size:13px;
  opacity:0.8;
}

.hidden{ display:none; }
</style>
</head>

<body>

<div class="container">

<!-- PAGE 1 -->
<div id="page1">
  <h2>anonymous confessions 💌</h2>
  <p class="small">your secret stays anonymous</p>

  <textarea placeholder="write your secret..."></textarea>

  <button onclick="submitSecret()">send anonymously 💌</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="hidden">

  <h2>your secret is submitted 💌</h2>
  <p class="small">we might feature it anonymously</p>

  <!-- AD 1 -->
  <div class="ad">Advertisement</div>

  <p>people are reading confessions right now ↓</p>

  <!-- AD 2 -->
  <div class="ad">Advertisement</div>

  <p class="small">some confessions are shocking 💀</p>

  <!-- AD 3 -->
  <div class="ad">Advertisement</div>

  <p>read more ↓</p>

</div>

</div>

<script>
function submitSecret(){
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
}
</script>

</body>
</html>
