<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Confessions 💌</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(-45deg, #ffe6f0, #ffd6ec, #fff, #ffe6f0);
      background-size: 400% 400%;
      animation: gradientBG 8s ease infinite;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 80px;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .box {
      width: 90%;
      max-width: 340px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(255, 105, 180, 0.25);
      animation: fadeIn 0.8s ease;
    }

    h2 {
      color: #ff4da6;
      font-size: 20px;
      margin-bottom: 8px;
    }

    p {
      color: #555;
      font-size: 13px;
    }

    textarea {
      width: 100%;
      height: 90px;
      border-radius: 12px;
      border: none;
      padding: 10px;
      margin-top: 10px;
      font-size: 13px;
      outline: none;
      background: rgba(255,255,255,0.8);
    }

    button {
      width: 100%;
      padding: 11px;
      margin-top: 12px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(to right, #ff66b2, #ff4da6);
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    #next {
      display: none;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* floating hearts */
    .heart {
      position: absolute;
      width: 15px;
      height: 15px;
      background: pink;
      transform: rotate(45deg);
      animation: float 6s linear infinite;
      opacity: 0.6;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 15px;
      height: 15px;
      background: pink;
      border-radius: 50%;
    }

    .heart::before {
      top: -7px;
      left: 0;
    }

    .heart::after {
      left: -7px;
      top: 0;
    }

    @keyframes float {
      0% {transform: translateY(0) rotate(45deg);}
      100% {transform: translateY(-800px) rotate(45deg);}
    }

  </style>
</head>

<body>

<!-- hearts -->
<div class="heart" style="left:10%; animation-duration:7s;"></div>
<div class="heart" style="left:30%; animation-duration:5s;"></div>
<div class="heart" style="left:60%; animation-duration:6s;"></div>
<div class="heart" style="left:80%; animation-duration:8s;"></div>

<div class="box" id="form">
  <h2>💌 Anonymous Confessions</h2>
  <p>Say anything… it's safe here 🫶</p>

  <textarea id="secret" placeholder="Type your secret..."></textarea>
  <button onclick="submitSecret()">Send Secret 💖</button>
</div>

<div class="box" id="next">
  <h2>Secret Sent 💕</h2>
  <p id="msg">Saving your secret...</p>
  <button id="btn" style="display:none;" onclick="openAd()">Read Other Secrets 💬</button>
</div>

<script>
  function submitSecret() {
    let text = document.getElementById("secret").value;

    if(text.length < 5){
      alert("Write something first 🥺");
      return;
    }

    document.getElementById("form").style.display = "none";
    document.getElementById("next").style.display = "block";

    setTimeout(() => {
      document.getElementById("msg").innerHTML = "Your secret is safe 💖";
      document.getElementById("btn").style.display = "block";
    }, 2000);
  }

  function openAd() {
    window.location.href = "https://www.profitablecpmratenetwork.com/w0u6gcrev7?key=b5ec894fc6cfd8188a3a33ad671542a8";
  }
</script>

</body>
</html>
