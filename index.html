<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Confessions 💌</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffe6f0,#e6f7ff);
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
  text-align:center;
}

h2{
  margin-top:20px;
  font-size:22px;
}

textarea{
  width:100%;
  height:140px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:15px;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#ff5f87;
  color:white;
  font-size:16px;
  font-weight:bold;
}

.small{
  font-size:13px;
  opacity:0.75;
  margin-top:10px;
}

.hidden{ display:none; }

.loader{
  margin-top:25px;
  font-size:14px;
  color:#555;
}

.progress{
  width:100%;
  height:6px;
  background:#eee;
  border-radius:10px;
  margin-top:20px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#ff5f87;
  animation: load 2.5s forwards;
}

@keyframes load{
  to{ width:100%; }
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1">
  <h2>anonymous confessions 💌</h2>
  <p class="small">your secret stays 100% anonymous</p>

  <textarea placeholder="write your secret..."></textarea>

  <button onclick="submitSecret()">send anonymously 💌</button>

  <p class="small">we never show identity</p>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
  <h2>verifying anonymity 💌</h2>
  <p class="small">checking secure submission system...</p>

  <div class="progress">
    <div class="bar"></div>
  </div>

  <div class="loader">preparing confessions feed...</div>
</div>

</div>

<script>
function submitSecret(){
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");

  setTimeout(()=>{
    window.location.href = "https://www.profitablecpmratenetwork.com/w0u6gcrev7?key=b5ec894fc6cfd8188a3a33ad671542a8";
  }, 2800);
}
</script>

</body>
</html>
