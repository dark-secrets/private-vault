<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Confessions 💌</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffe6f0,#e6f7ff);
}

/* GLASS CONTAINER */
.container{
  max-width:420px;
  margin:40px auto;
  padding:20px;
  text-align:center;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border-radius:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

h2{
  margin-top:10px;
  font-size:22px;
}

/* TEXTAREA FIXED */
textarea{
  width:100%;
  height:140px;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:15px;
  font-size:14px;
  box-sizing:border-box;
}

/* GLOW BUTTON */
button{
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#ff4d79;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow{
  from{ box-shadow:0 0 6px #ff4d79; }
  to{ box-shadow:0 0 18px #ff4d79; }
}

.small{
  font-size:13px;
  opacity:0.8;
  margin-top:10px;
}

.hidden{ display:none; }

/* LOADING BAR */
.progress{
  width:100%;
  height:6px;
  background:#eee;
  border-radius:10px;
  margin-top:20px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#ff4d79;
  animation: load 3s forwards;
}

@keyframes load{
  to{ width:100%; }
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1">
  <h2>anonymous confessions 💌</h2>

  <p class="small">some secrets here are not meant to be seen by everyone…</p>

  <textarea placeholder="type your secret..."></textarea>

  <button onclick="go()">submit & see secrets 💀</button>

  <p class="small">once you enter, you can’t unsee them…</p>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
  <h2>unlocking hidden confessions 💌</h2>

  <p class="small">filtering the most intense secrets...</p>

  <div class="progress">
    <div class="bar"></div>
  </div>

  <p id="count" class="small"></p>

  <p class="small">some of these might shock you…</p>
</div>

</div>

<script>
function go(){
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");

  let num = Math.floor(Math.random() * 50) + 20;
  document.getElementById("count").innerText = num + " secrets unlocked today 💌";

  setTimeout(()=>{
    window.location.href = "https://www.profitablecpmratenetwork.com/w0u6gcrev7?key=b5ec894fc6cfd8188a3a33ad671542a8";
  }, 3200);
}

/* SAFE BACK RELOAD */
window.addEventListener("pageshow", function(event) {
  if (event.persisted || (performance.getEntriesByType("navigation")[0] && performance.getEntriesByType("navigation")[0].type === "back_forward")) {
    window.location.reload();
  }
});
</script>

</body>
</html>
