<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Confessions 💌</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #ffe6f0, #fff);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 380px;
      background: white;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
    }

    h2 {
      color: #ff4da6;
      margin-bottom: 10px;
    }

    p {
      color: #777;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 100px;
      border-radius: 15px;
      border: 1px solid #ffd6e8;
      padding: 10px;
      margin-top: 10px;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 25px;
      background: #ff66b2;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #next {
      display: none;
    }

  </style>
</head>

<body>

<div class="box" id="form">
  <h2>💌 Anonymous Confessions</h2>
  <p>Share anything… no one will know 🫶</p>

  <textarea id="secret" placeholder="Type your secret here..."></textarea>
  <button onclick="submitSecret()">Send Secret 💖</button>
</div>

<div class="box" id="next">
  <h2>Secret Sent 💕</h2>
  <p id="msg">Saving your secret...</p>
  <button id="btn" style="display:none;" onclick="openAd()">Read Other Secrets 💬</button>
</div>

<script>
  function submitSecret() {
    let text = document.getElementById("secret").value;

    if(text.length < 5){
      alert("Write something first 🥺");
      return;
    }

    document.getElementById("form").style.display = "none";
    document.getElementById("next").style.display = "block";

    setTimeout(() => {
      document.getElementById("msg").innerHTML = "Your secret is safe 💖";
      document.getElementById("btn").style.display = "block";
    }, 2500);
  }

  function openAd() {
    window.location.href = "https://www.profitablecpmratenetwork.com/w0u6gcrev7?key=b5ec894fc6cfd8188a3a33ad671542a8";
  }
</script>

</body>
</html>
