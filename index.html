<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Confessions</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    .box {
      max-width: 400px;
      margin: auto;
    }

    textarea {
      width: 100%;
      height: 100px;
      border-radius: 10px;
      border: none;
      padding: 10px;
    }

    button {
      padding: 12px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 20px;
      background: #ff3d7f;
      color: white;
      cursor: pointer;
    }

    #next {
      display: none;
    }
  </style>
</head>

<body>

<div class="box" id="form">
  <h2>Share Your Secret 💬</h2>
  <p>100% anonymous</p>

  <textarea id="secret" placeholder="Type your secret..."></textarea>
  <button onclick="submitSecret()">Submit</button>
</div>

<div class="box" id="next">
  <h2>Secret Submitted 💋</h2>
  <p>Processing...</p>
  <button onclick="openAd()">View Other Secrets</button>
</div>

<script>
  function submitSecret() {
    let text = document.getElementById("secret").value;

    if(text.length < 5){
      alert("Write something first");
      return;
    }

    document.getElementById("form").style.display = "none";
    document.getElementById("next").style.display = "block";

    setTimeout(() => {
      document.querySelector("#next p").innerHTML = "See what others shared 👇";
    }, 2000);
  }

  function openAd() {
    window.location.href = "https://www.profitablecpmratenetwork.com/w0u6gcrev7?key=b5ec894fc6cfd8188a3a33ad671542a8";
  }
</script>

</body>
</html>
